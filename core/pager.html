<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 16px;border-top:1px solid #eef0f3;flex-wrap:wrap">
  <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
    <span style="font-size:12.5px;color:#9ca3af">Mostrando <b style="color:#374151">{{ pg.from }}</b>–<b style="color:#374151">{{ pg.to }}</b> de <b style="color:#374151">{{ pg.total }}</b></span>
    <div style="display:flex;align-items:center;gap:7px">
      <span style="font-size:12px;color:#9ca3af">por página</span>
      <select value="{{ pg.per }}" onChange="{{ pg.onPer }}" style="height:30px;border:1px solid #e3e7ec;border-radius:8px;background:#fff;font-size:12.5px;color:#374151;padding:0 7px;cursor:pointer;font-family:inherit">
        <sc-for list="{{ pg.perList }}" as="o" hint-placeholder-count="5"><option value="{{ o.v }}">{{ o.label }}</option></sc-for>
      </select>
    </div>
  </div>
  <div style="display:flex;gap:5px;align-items:center;flex-wrap:wrap">
    <button onClick="{{ pg.onPrev }}" style="{{ pg.prevStyle }}">Anterior</button>
    <sc-for list="{{ pg.pages }}" as="p" hint-placeholder-count="3"><button onClick="{{ p.onClick }}" style="{{ p.style }}">{{ p.label }}</button></sc-for>
    <button onClick="{{ pg.onNext }}" style="{{ pg.nextStyle }}">Próxima</button>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;57px&quot;},&quot;pg&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;any&quot;}}"></script>
</body>
</html>
