<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SOGI módulo</title>
<link rel="stylesheet" href="app/tokens.css" />
<style>html,body{height:100%;margin:0;background:var(--bg,#f1f5f9)}#root{height:100%}</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script>window.SOGI_TOAST=function(){};window.SOGI_CTX=function(){};window.SOGI_NEW_TASK=function(){};window.SOGI_OPEN_TASK=function(){};window.SOGI_OPEN_MOBILE=function(){};window.SOGI_LOGOUT=function(){};window.SOGI_TOGGLE_THEME=function(){};</script>
<script src="app/data.js"></script>
<script src="app/data-extra.js"></script>
<script src="app/data-extra2.js"></script>
<script src="app/data-extra3.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="app/tweaks-panel.jsx"></script>
<script type="text/babel" src="app/components.jsx"></script>
<script type="text/babel" src="app/projetos.jsx"></script>
<script type="text/babel" src="app/projeto-views.jsx"></script>
<script type="text/babel" src="app/fluxograma.jsx"></script>
<script type="text/babel" src="app/tarefas.jsx"></script>
<script type="text/babel" src="app/chamados.jsx"></script>
<script type="text/babel" src="app/comunicacao.jsx"></script>
<script type="text/babel" src="app/calendario.jsx"></script>
<script type="text/babel" src="app/gamificacao.jsx"></script>
<script type="text/babel" src="app/feed.jsx"></script>
<script type="text/babel">
function HostApp(){
  const params = new URLSearchParams(location.search);
  const screen = params.get('screen') || 'comunicacao';
  const [projectId, setProjectId] = React.useState(null);
  const [taskOpen, setTaskOpen] = React.useState(false);
  const [newTaskOpen, setNewTaskOpen] = React.useState(false);
  React.useEffect(() => {
    window.SOGI_NEW_TASK = () => setNewTaskOpen(true);
    window.SOGI_OPEN_TASK = () => setTaskOpen(true);
  }, []);
  let content = null;
  if (screen === 'comunicacao') content = <ChatScreen onNavigate={() => {}} />;
  else if (screen === 'calendario') content = <CalendarScreen onOpenTask={() => setTaskOpen(true)} />;
  else if (screen === 'gamificacao') content = <GamificationScreen />;
  else if (screen === 'chamados') content = <TicketsScreen />;
  else if (screen === 'projetos') content = projectId
    ? <ProjectWorkspace projectId={projectId} onBack={() => setProjectId(null)} onOpenTask={() => setTaskOpen(true)} />
    : <ProjectsScreen onOpenProject={(id) => setProjectId(id)} />;
  else if (screen === 'feed') content = <FeedScreen onNavigate={() => {}} />;
  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100vh', overflow: 'hidden', background: 'var(--bg)' }}>
      <main style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0, minHeight: 0 }}>{content}</main>
      {taskOpen && typeof TaskDrawer !== 'undefined' && <TaskDrawer onClose={() => setTaskOpen(false)} />}
      {newTaskOpen && typeof NewTaskModal !== 'undefined' && <NewTaskModal onClose={() => setNewTaskOpen(false)} onCreate={(t) => { try { SOGI_DATA.myTasks.unshift(t); } catch (e) {} }} />}
      {typeof ToastHost !== 'undefined' && <ToastHost />}
      {typeof CtxMenuHost !== 'undefined' && <CtxMenuHost />}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<HostApp />);
</script>
</body>
</html>
